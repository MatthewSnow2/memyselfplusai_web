<!-- Netlify Forms detection file -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms</title>
</head>
<body>
  <!-- Contact form for Netlify to detect -->
  <form name="contact" method="POST" data-netlify="true" netlify hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
