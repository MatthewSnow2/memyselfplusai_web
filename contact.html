<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Me, Myself Plus AI for a discovery call or to learn more about our agentic automation services." />
  <title>Contact | Me, Myself Plus AI</title>
  <link rel="icon" type="image/png" href="public/images/FullLogo_Transparent_NoBuffer.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/css/navigation.css">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0b0b13; margin: 0; }
    #bg-canvas {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0;
      display: block;
      background: #0b0b13;
    }
    .main-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 90px !important; /* Further increased to account for fixed navbar */
    }
    .logo {
      margin-top: 36px;
      margin-bottom: 12px;
      height: 120px;
      max-width: 340px;
      width: auto;
      display: block;
    }
    .headline {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 600;
      text-align: center;
      margin-top: 18vh;
      margin-bottom: 28px;
      width: 90vw;
      max-width: 1100px;
      letter-spacing: -0.01em;
    }
    .contact-section {
      background: rgba(30,41,59,0.90);
      border-radius: 18px;
      box-shadow: 0 2px 24px 0 rgba(20,184,166,0.07);
      margin: 0 auto 36px auto;
      padding: 32px 8vw;
      max-width: 600px;
      color: #e6f7f7;
      font-size: 1.13rem;
    }
    .contact-form label {
      display: block;
      margin-bottom: 8px;
      color: #7dd3fc;
      font-weight: 500;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      margin-bottom: 18px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #14b8a6;
      background: #0b0b13;
      color: #e6f7f7;
      font-size: 1rem;
    }
    .contact-form button {
      background: linear-gradient(90deg, #14b8a6 40%, #06b6d4 100%);
      color: #fff;
      font-weight: 600;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 24px 0 rgba(6,182,212,0.15);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .contact-form button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 32px 0 rgba(6,182,212,0.25);
    }
    @media (max-width: 600px) {
      .logo { height: 80px; max-width: 220px; }
      .headline { font-size: 1.1rem; margin-top: 12vh; }
      .contact-section { font-size: 1rem; padding: 18px 4vw; }
    }
    .main-nav { 
      font-family: 'Inter', sans-serif; 
      font-size: 1.08rem;
      position: fixed;
      top: 0;
      left: 0; 
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      padding: 18px 0;
      background-color: rgba(11, 11, 19, 0.95);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }
    .nav-link { 
      color: #7dd3fc; 
      text-decoration: none; 
      font-weight: 600; 
      padding: 3px 8px; 
      border-radius: 6px; 
      transition: background 0.18s, color 0.18s; 
    }
    .nav-link:hover, .nav-link:focus { 
      background: #14b8a6; 
      color: #fff; 
      outline: none; 
    }
    .nav-link[aria-current="page"] { 
      background: #14b8a6; 
      color: #fff; 
    }
    @media (max-width: 600px) {
      .logo { height: 80px; max-width: 220px; }
      .headline { font-size: 1.1rem; margin-top: 12vh; }
      .contact-form { padding: 16px 6px; width: 92%; font-size: 0.92rem; }
      .main-nav { font-size: 0.95rem; gap: 1.5rem; }
    }
    .success-section {
      text-align: center;
      margin-top: 20px;
    }
    .success-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #14b8a6;
    }
  </style>
</head>
<body style="margin:0; padding:0; overflow-x:hidden;">
  <canvas id="bg-canvas"></canvas>
  
  <!-- Fixed navigation header with inline styles for critical rendering -->  
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: rgba(11, 11, 19, 0.95); box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5); z-index: 9999; display: flex; justify-content: center; align-items: center; -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);">
    <nav style="display: flex; justify-content: center; align-items: center; gap: 2.5rem; font-family: 'Inter', sans-serif; font-size: 1.08rem;">
      <a href="index.html" style="color: #7dd3fc; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">Home</a>
      <a href="about.html" style="color: #7dd3fc; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">About</a>
      <a href="services.html" style="color: #7dd3fc; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">Services</a>
      <a href="projects.html" style="color: #7dd3fc; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">Projects</a>
      <a href="blog/index.html" style="color: #7dd3fc; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">Blog</a>
      <a href="contact.html" style="color: #fff; background: #14b8a6; text-decoration: none; font-weight: 600; padding: 6px 12px; border-radius: 6px; transition: background 0.18s, color 0.18s;">Contact</a>
    </nav>
  </div>
  
  <div class="main-content">
    <img src="public/images/FullLogo_Transparent_NoBuffer.png" alt="Me Myself Plus AI Logo" class="logo" />
    <div class="headline">Contact Us</div>
    <div class="contact-section">
      <!-- Formspree form with n8n integration via email -->
      <form id="contact-form" action="https://formspree.io/f/xrgdvyjv" method="POST">
        <div class="contact-form">
          <input type="hidden" name="_subject" value="New Website Contact Form Submission">
          <!-- Add these fields to make processing in n8n easier -->
          <input type="hidden" name="form_source" value="memyselfplusai.com">
          <input type="hidden" name="submission_timestamp" id="timestamp-field">
          
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
          <input type="hidden" name="_next" value="https://memyselfplusai.com/contact-success.html">
          <button type="submit">Send Message</button>
        </div>
      </form>
      <!-- Success message, hidden by default -->
      <div id="form-success" style="display: none;">
        <div class="success-section">
          <div class="success-icon">✓</div>
          <h2>Thank You!</h2>
          <p>Your message has been sent successfully. We'll get back to you as soon as possible.</p>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Animated glowing dots background (canvas)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let dots = [];
    const DOTS = 40;
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();
    function randomDot() {
      return {
        x: Math.random() * width,
        y: Math.random() * height,
        r: 6 + Math.random() * 10,
        dx: (Math.random() - 0.5) * 0.6,
        dy: (Math.random() - 0.5) * 0.6,
        color: `rgba(20,184,166,${0.15 + Math.random() * 0.55})`
      };
    }
    function distance(a, b) {
      return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
    }
    function updateDots() {
      for (let d of dots) {
        d.x += d.dx;
        d.y += d.dy;
        if (d.x < 0 || d.x > width) d.dx *= -1;
        if (d.y < 0 || d.y > height) d.dy *= -1;
      }
      // Occasionally merge dots
      for (let i = 0; i < dots.length; ++i) {
        for (let j = i+1; j < dots.length; ++j) {
          let a = dots[i], b = dots[j];
          if (distance(a, b) < (a.r + b.r) * 0.8) {
            // Merge: average position, increase radius
            a.x = (a.x + b.x) / 2;
            a.y = (a.y + b.y) / 2;
            a.r = Math.min(24, a.r + b.r * 0.18);
            b.x = Math.random() * width;
            b.y = Math.random() * height;
            b.r = 6 + Math.random() * 10;
          }
        }
      }
    }
    function drawDots() {
      ctx.clearRect(0, 0, width, height);
      for (let d of dots) {
        let grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r);
        grad.addColorStop(0, d.color);
        grad.addColorStop(1, 'rgba(20,184,166,0)');
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.shadowColor = '#14b8a6';
        ctx.shadowBlur = 16;
        ctx.fill();
      }
    }
    function animate() {
      updateDots();
      drawDots();
      requestAnimationFrame(animate);
    }
    // Init dots
    dots = Array.from({length: DOTS}, randomDot);
    animate();

    // Set timestamp and handle form submission
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      // Set timestamp field for n8n processing
      document.getElementById('timestamp-field').value = new Date().toISOString();
    });
  </script>
</body>
</html>
